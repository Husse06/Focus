<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Pet — Pomodoro Timer with Virtual Pet</title>
    <meta name="description" content="A cozy Pomodoro timer app with a virtual pixel-art pet that works alongside you. Stay focused, earn XP, and level up your pet!" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
  </head>
  <body>
    <div id="app">
      <!-- Top Bar -->
      <header id="top-bar">
        <div id="pet-name-area">
          <span id="pet-emoji">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </span>
          <span id="pet-name" title="Click to rename">Bubbles</span>
          <input id="pet-name-input" type="text" class="hidden" maxlength="16" autocomplete="off" />
        </div>
        <div id="xp-bar-container">
          <div id="xp-bar-track">
            <div id="xp-bar-fill"></div>
          </div>
          <span id="xp-label">Lv. 1</span>
        </div>
        <button id="stats-btn" aria-label="Open stats panel">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="12" width="4" height="9" rx="1"/>
            <rect x="10" y="7" width="4" height="14" rx="1"/>
            <rect x="17" y="3" width="4" height="18" rx="1"/>
          </svg>
        </button>
      </header>

      <!-- Pet Enclosure -->
      <main id="pet-enclosure">
        <div id="pet-glow"></div>
        <div id="pet-container"></div>
        <p id="pet-status-text">Waiting for you to start...</p>
      </main>

      <!-- Control Center -->
      <footer id="control-center">
        <div id="task-input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          <input id="task-input" type="text" placeholder="What are we focusing on?" maxlength="60" autocomplete="off" />
        </div>
        <div id="session-mode-label">Focus Session</div>
        <div id="pomodoro-tracker">
          <span class="pomo-dot"></span>
          <span class="pomo-dot"></span>
          <span class="pomo-dot"></span>
          <span class="pomo-dot"></span>
        </div>
        <div id="timer-display">25:00</div>
        <div id="button-group">
          <button id="start-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start Focus
          </button>
          <button id="pause-btn" class="hidden">
            <svg id="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
            <svg id="resume-icon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <span id="pause-text">Pause</span>
          </button>
          <button id="giveup-btn" class="hidden">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            Give Up
          </button>
          <button id="skip-btn" class="hidden">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="13 17 18 12 13 7"></polyline>
              <polyline points="6 17 11 12 6 7"></polyline>
            </svg>
            Skip
          </button>
        </div>
        <p id="current-task-label" class="hidden"></p>
      </footer>

      <!-- Stats Overlay -->
      <div id="stats-backdrop" class="hidden"></div>
      <aside id="stats-panel" class="hidden">
        <div id="stats-header">
          <h2>Your Stats</h2>
          <button id="stats-close-btn" aria-label="Close stats panel">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="stats-body">
          <div class="stat-card">
            <span class="stat-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </span>
            <div class="stat-info">
              <span class="stat-value" id="stat-total-time">0m</span>
              <span class="stat-label">Total Focus Time</span>
            </div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </span>
            <div class="stat-info">
              <span class="stat-value" id="stat-level">Level 1</span>
              <span class="stat-label">Current Level</span>
            </div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </span>
            <div class="stat-info">
              <span class="stat-value" id="stat-sessions">0</span>
              <span class="stat-label">Sessions Completed</span>
            </div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            </span>
            <div class="stat-info">
              <span class="stat-value" id="stat-xp">0 / 100 XP</span>
              <span class="stat-label">Experience Points</span>
            </div>
          </div>
          <div id="chart-section">
            <h3>Last 7 Days</h3>
            <div id="weekly-chart"></div>
            <div id="chart-labels"></div>
          </div>
        </div>
      </aside>

      <!-- Confetti container -->
      <div id="confetti-container"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
